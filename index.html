<!DOCTYPE html>
<html>
<head>
<title>Free Gaming Zone</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#111;
padding:20px;
font-size:35px;
color:lime;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.game-card{
background:#1b1b1b;
padding:15px;
border-radius:15px;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:10px;
}

button{
background:lime;
border:none;
padding:10px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:green;
color:white;
}

</style>
</head>

<body>

<header>
🎮 FREE GAMING ZONE
</header>

<h2>Play Online Games Free</h2>

<div class="games">

<div class="game-card">
<h3>Car Racing Game</h3>

<iframe src="https://html5.gamemonetize.co/"></iframe>

<button>Play Now</button>
</div>

<div class="game-card">
<h3>Shooting Game</h3>

<iframe src="https://html5.gamemonetize.co/"></iframe>

<button>Play Now</button>
</div>

<div class="game-card">
<h3>Adventure Game</h3>

<iframe src="https://html5.gamemonetize.co/"></iframe>

<button>Play Now</button>
</div>

</div>

</body>
</html>
